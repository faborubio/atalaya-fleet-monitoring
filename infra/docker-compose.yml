# Infraestructura de desarrollo de Atalaya (ADR-009).
# Reproduce el pipeline event-driven en local sin nube real:
#   - LocalStack (AWS): SNS (fan-out) + SQS (buffer + DLQ) + S3 (data lake)
#   - pubsub-emulator (GCP, ADR-013): broker Pub/Sub (perfil "gcp", no arranca por defecto)
#   - fake-gcs (GCP, ADR-013): data lake Cloud Storage (perfil "gcp")
#   - Redis: set de deduplicación (ADR-006) + backplane de SignalR (ADR-002)
#   - Postgres: read models + telemetría (ADR-005/007)
#
# Uso (AWS, por defecto):  docker compose -f infra/docker-compose.yml up -d
# Uso (GCP, ADR-013):      docker compose -f infra/docker-compose.yml up -d redis postgres pubsub-emulator fake-gcs
#       docker compose -f infra/docker-compose.yml down   (añade -v para borrar datos)

name: atalaya-dev

services:
  localstack:
    # 3.x = edición community (SNS/SQS/S3 gratis, sin token). Evitar 'latest':
    # apunta a builds 2026.x que exigen LOCALSTACK_AUTH_TOKEN (pro).
    image: localstack/localstack:3.7
    ports:
      - '4566:4566' # edge endpoint (todos los servicios AWS)
    environment:
      - SERVICES=sns,sqs,s3
      - DEBUG=0
      - AWS_DEFAULT_REGION=us-east-1
    volumes:
      - ./localstack/init:/etc/localstack/init/ready.d:ro
    healthcheck:
      test: ['CMD', 'awslocal', 'sqs', 'list-queues']
      interval: 10s
      timeout: 5s
      retries: 10

  # Emulador de Google Cloud Pub/Sub (ADR-013). Perfil "gcp": no arranca con el `up` por defecto;
  # se levanta nombrándolo explícitamente (ver cabecera). El app crea topic/suscripción al arrancar.
  # Imagen oficial del Cloud SDK (~grande); alternativa ligera: imágenes community de pubsub-emulator.
  pubsub-emulator:
    image: gcr.io/google.com/cloudsdktool/google-cloud-cli:emulators
    profiles: ['gcp']
    command: >
      gcloud beta emulators pubsub start
      --host-port=0.0.0.0:8085 --project=atalaya-local
    ports:
      - '8085:8085'
    healthcheck:
      test: ['CMD-SHELL', "timeout 1 bash -c '</dev/tcp/localhost/8085' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  # Emulador de Google Cloud Storage (ADR-013, fase G2): data lake de eventos crudos. Perfil "gcp".
  # `-scheme http` para que el cliente .NET (STORAGE_EMULATOR_HOST=http://localhost:4443) conecte sin TLS.
  fake-gcs:
    image: fsouza/fake-gcs-server:latest
    profiles: ['gcp']
    command: ['-scheme', 'http', '-port', '4443', '-external-url', 'http://localhost:4443']
    ports:
      - '4443:4443'
    healthcheck:
      test: ['CMD-SHELL', "wget -q -O- http://localhost:4443/storage/v1/b || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - '6379:6379'
    command: ['redis-server', '--save', '', '--appendonly', 'no']
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 3s
      retries: 5

  postgres:
    image: postgres:16-alpine
    ports:
      - '5432:5432'
    environment:
      - POSTGRES_USER=atalaya
      - POSTGRES_PASSWORD=atalaya
      - POSTGRES_DB=atalaya
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U atalaya']
      interval: 10s
      timeout: 3s
      retries: 5

volumes:
  pgdata:
